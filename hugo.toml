baseURL = "https://www.20-100.net/"
languageCode = "en-us"
title = "vnceb"
theme = "mono"
enableRobotsTXT = true
capitalizeListTitles = false
pluralizeListTitles = false
rssLimit = 20

[taxonomies]
  tag = "tags"

[params]
  tagline = "Notes on IAM, cybersecurity, AI, and emerging technologies"
  author = "Vincent Brousseau"
  description = "Vincent Brousseau · Enterprise Architect, IAM & Cybersecurity"
  github = "https://github.com/vnceb"
  gitlab = "https://gitlab.com/vnceb"
  twitter = "https://x.com/vnceb"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[pagination]
  pagerSize = 10

[permalinks]
  log = "/log/:slug/"
  research = "/research/:slug/"
  tags = "/topics/:slug/"
