baseURL = "https://www.20-100.net/"
languageCode = "en-us"
title = "vnceb"
theme = "mono"
enableRobotsTXT = true

[taxonomies]
  tag = "tags"

[params]
  tagline = "Bridging the gap between cutting-edge technology and secure solutions"
  author = "Vincent Brousseau"
  description = "Vincent Brousseau · Enterprise Architect | Security & Technology"
  github = "https://github.com/vnceb"
  gitlab = "https://gitlab.com/vnceb"
  twitter = "https://x.com/vnceb"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[pagination]
  pagerSize = 10

[permalinks]
  log = "/log/:slug/"
  deep-dives = "/deep-dives/:slug/"
  tags = "/topics/:slug/"
